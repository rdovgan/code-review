# Central project registry for the Code Review Bot
#
# Each key under "projects" is a Bitbucket repo full name: workspace/repository-slug
# Settings here are the BASE config for that project.
# If the repo also has a .codereview.yml, its values OVERRIDE these.
# If a field is omitted, the system default applies.
#
# Credentials (username, app_password, webhook_secret) are stored per-workspace
# in config/credentials.yml — not here.
#
# To add a new project: copy any block below, change the repo key + settings,
# then add a webhook in Bitbucket. No restart required.

projects:

# ── Java applications ──────────────────────────────────────────────────

  rdovgan/pathminer:
    language: java
    ai_review: true
    static_analysis: true
    block_merge_on:
      - CRITICAL
    max_diff_lines: 2500
    ignore_paths:
      - "data/*"
      - "**/*.png"
    semgrep_rules:
      - owasp
      - security-audit
      - p/java
      - p/findsecbugs
      - p/sql-injection
      - p/secrets
    ai_focus:
      - security
      - bugs

